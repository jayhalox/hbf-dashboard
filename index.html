<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBF MONITOR — Global Value Chain Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
:root {
  --bg:#080b10;--surface:#0d1117;--card:#111722;--border:#1a2332;
  --border-glow:#1e3048;--text:#e6edf3;--text-dim:#7d8590;--text-muted:#484f58;
  --cyan:#00b4d8;--cyan-glow:rgba(0,180,216,0.20);
  --green:#3fb950;--green-bg:rgba(63,185,80,0.10);
  --red:#f85149;--red-bg:rgba(248,81,73,0.10);
  --gold:#d2991d;--purple:#a371f7;--radius:10px;--radius-sm:7px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5;
  overflow-x:hidden;
}
.container{max-width:1320px;margin:0 auto;padding:16px 20px}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 10px;border-bottom:1px solid var(--border);
  margin-bottom:16px;flex-wrap:wrap;gap:8px;
}
.topbar .logo{font-size:18px;font-weight:800;letter-spacing:2px;color:#fff}
.topbar .logo span{color:var(--cyan)}
.tabs{display:flex;gap:2px}
.tab{
  padding:7px 18px;border:none;background:transparent;
  color:var(--text-dim);font-size:12px;font-weight:600;
  cursor:pointer;border-radius:6px;transition:none;
  font-family:inherit;letter-spacing:.5px;position:relative;
}
.tab.active{color:var(--cyan)}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:30%;right:30%;height:2px;
  background:var(--cyan);border-radius:2px;
  box-shadow:0 0 8px var(--cyan-glow);
}
.live-indicator{display:flex;align-items:center;gap:6px;color:var(--cyan);font-size:11px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan)}
.update-time{color:var(--text-muted);font-size:11px}

.summary-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px
}
.summary-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  position:relative;overflow:hidden;
}
.summary-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
}
.summary-card .s-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.summary-card .s-value{font-size:22px;font-weight:700}
.summary-card .s-sub{font-size:11px;margin-top:2px}
.up{color:var(--green)}.down{color:var(--red)}

.chain-title{
  font-size:13px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;
}
.chain-flow{display:flex;gap:0;align-items:flex-start;position:relative;margin-bottom:28px;overflow-x:auto}
.chain-step{flex:1;min-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative}
.chain-step+.chain-step{margin-left:0}
.chain-connector{
  display:flex;align-items:center;justify-content:center;
  min-width:40px;color:var(--cyan);font-size:16px;opacity:.6;align-self:stretch;
}
.chain-connector .line{
  width:2px;height:100%;min-height:60px;
  background:linear-gradient(180deg,transparent,var(--cyan),transparent);opacity:.4;
}
.step-label{font-size:10px;color:var(--cyan);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.chain-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;
  cursor:pointer;overflow:hidden;transform:translateY(0);
}
.chain-card:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,180,216,0.08)}
.chain-card .cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.chain-card .cc-name{font-size:13px;font-weight:700}
.chain-card .cc-ticker{font-size:10px;color:var(--text-dim);font-family:monospace;margin-bottom:6px}
.chain-card .cc-bottom{display:flex;justify-content:space-between;align-items:center}
.chain-card .cc-price{font-size:15px;font-weight:700;font-family:'SF Mono',monospace}
.chain-card .cc-change{font-size:11px;font-weight:700;border-radius:4px;padding:2px 7px}
.cc-up .cc-change{background:var(--green-bg);color:var(--green)}
.cc-down .cc-change{background:var(--red-bg);color:var(--red)}
.cc-spark{height:28px;margin-top:6px;opacity:.5}
.cc-spark svg{width:100%;height:100%}

.panels{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-top:6px}
.news-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.news-panel h3{font-size:12px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.news-item{padding:10px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-item .n-source{font-size:9px;color:var(--cyan);text-transform:uppercase;margin-bottom:2px}
.news-item .n-title{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.4}
.news-item .n-summary{font-size:11px;color:var(--text-dim);line-height:1.4}

.sources-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.sources-panel h3{font-size:12px;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.source-tag{display:inline-block;padding:5px 10px;margin:0 4px 6px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--text-dim)}

.insight-bar{
  background:linear-gradient(135deg,rgba(0,180,216,0.05),rgba(163,113,247,0.04));
  border:1px solid var(--border-glow);border-radius:var(--radius);
  padding:14px 18px;margin-top:16px;font-size:12px;color:#b0b8c4;line-height:1.6;
}
.insight-bar strong{color:var(--gold)}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.82);z-index:999;
  justify-content:center;align-items:center;
  backdrop-filter:blur(4px);
}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;width:min(92vw,780px);max-height:88vh;
  overflow-y:auto;padding:22px;position:relative;
}
.modal .close-btn{
  position:absolute;top:12px;right:14px;background:none;
  border:none;color:var(--text-dim);font-size:22px;
  cursor:pointer;width:34px;height:34px;display:flex;
  align-items:center;justify-content:center;border-radius:50%;
}
.modal .close-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.modal .m-name{font-size:20px;font-weight:700}
.modal .m-meta{font-size:11px;color:var(--text-dim);margin-bottom:14px}
.chart-wrap canvas{border-radius:8px;background:var(--card)}

.footer{text-align:center;padding:24px;font-size:10px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:28px}
.footer a{color:var(--cyan);text-decoration:none}

@media(max-width:900px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .chain-flow{flex-direction:column}.chain-connector{display:none}
  .panels{grid-template-columns:1fr}
}
@media(max-width:500px){
  .summary-row{grid-template-columns:1fr 1fr}
  .topbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="container">

<div class="topbar">
  <div class="logo">HBF <span>MONITOR</span></div>
  <div class="tabs" id="tabBar"></div>
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div class="live-indicator"><div class="live-dot" id="liveDot"></div>Live Update</div>
    <div class="update-time" id="updateTime"></div>
  </div>
</div>

<div class="summary-row" id="summaryRow"></div>

<div class="chain-title gsap-section">🔗 HBF Value Chain Map</div>
<div class="chain-flow gsap-section" id="chainFlow"></div>

<div class="panels gsap-section">
  <div>
    <div class="news-panel" id="newsPanel"></div>
    <div class="insight-bar" id="insightBar"></div>
  </div>
  <div class="sources-panel" id="sourcesPanel"></div>
</div>

<footer class="footer gsap-section">
  HBF Global Value Chain Monitor · Powered by Hermes Agent · <a href="https://github.com/jayhalox/hbf-dashboard">GitHub</a><br>
  Data: Yahoo Finance · News: OCP / FMS / SE / The Elec / TrendForce · GSAP Animation
</footer>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="m-name" id="mName"></div>
    <div class="m-meta" id="mMeta"></div>
    <div class="chart-wrap" id="chartWrap"></div>
  </div>
</div>

<script>
// ===== Register GSAP Plugins =====
gsap.registerPlugin(ScrollTrigger);

// ===== DATA =====
const UPDATE_TIME=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
document.getElementById('updateTime').textContent='Last Update: '+UPDATE_TIME+' KST';

const STOCKS=[
  {id:'sk',name:'SK hynix',ticker:'000660.KS',country:'KR',flag:'🇰🇷',step:'idm',price:2764000,prev:2685000,chg:79000,chgPct:2.94,spark:[18,3,16,14,11,8,2,15,8,19,32,39,93]},
  {id:'ss',name:'Samsung',ticker:'005930.KS',country:'KR',flag:'🇰🇷',step:'idm',price:354000,prev:362500,chg:-8500,chgPct:-2.34,spark:[13,0,0,0,6,15,5,12,8,20,30,42,87]},
  {id:'wdc',name:'SanDisk / WD',ticker:'WDC',country:'US',flag:'🇺🇸',step:'idm',price:746.23,prev:712.13,chg:34.10,chgPct:4.79,spark:[3,20,10,24,19,31,34,34,32,26,22,36,82],note:'⚠️ HBF 최초 고안·OCP 표준화 주도'},
  {id:'mu',name:'Micron',ticker:'MU',country:'US',flag:'🇺🇸',step:'idm',price:1133.99,prev:1043.19,chg:90.80,chgPct:8.70,spark:[9,6,7,16,14,5,18,22,29,22,24,16,100]},
  {id:'kioxia',name:'Kioxia',ticker:'(비상장)',country:'JP',flag:'🇯🇵',step:'idm',price:null,prev:null,chg:null,chgPct:null,spark:null,note:'샌디스크와 낸드 합작'},
  {id:'amat',name:'Applied Materials',ticker:'AMAT',country:'US',flag:'🇺🇸',step:'equip',price:617.11,prev:592.92,chg:24.19,chgPct:4.08,spark:[12,28,24,36,28,19,30,27,41,40,32,29,88]},
  {id:'tel',name:'Tokyo Electron',ticker:'8035.T',country:'JP',flag:'🇯🇵',step:'equip',price:75360,prev:76080,chg:-720,chgPct:-0.95,spark:[20,25,20,21,22,18,29,27,39,50,60,52,85]},
  {id:'asml',name:'ASML',ticker:'ASML',country:'NL',flag:'🇳🇱',step:'equip',price:1929.68,prev:1867.83,chg:61.85,chgPct:3.31,spark:[24,27,22,26,28,26,36,48,55,52,63,63,81]},
  {id:'asmi',name:'ASM International',ticker:'ASM',country:'NL',flag:'🇳🇱',step:'equip',price:6.54,prev:6.83,chg:-0.29,chgPct:-4.25,spark:[20,0,2,0,0,0,8,20,20,16,26,31,94]},
  {id:'hanmi',name:'한미반도체',ticker:'042700.KS',country:'KR',flag:'🇰🇷',step:'equip',price:295000,prev:315500,chg:-20500,chgPct:-6.50,spark:[7,0,0,13,20,27,25,38,46,49,57,59,84]},
  {id:'psk',name:'PSK Holdings',ticker:'031980.KS',country:'KR',flag:'🇰🇷',step:'equip',price:112500,prev:120500,chg:-8000,chgPct:-6.64,spark:[87,75,85,72,61,51,57,48,55,54,59,47,19]},
  {id:'entg',name:'Entegris',ticker:'ENTG',country:'US',flag:'🇺🇸',step:'equip',price:178.77,prev:157.34,chg:21.43,chgPct:13.62,spark:[10,18,25,15,26,39,32,43,50,64,62,76,83]},
  {id:'soul',name:'솔브레인',ticker:'357780.KS',country:'KR',flag:'🇰🇷',step:'equip',price:366000,prev:403000,chg:-37000,chgPct:-9.18,spark:[84,69,69,55,64,73,67,69,79,70,72,61,20]},
  {id:'tck',name:'티씨케이',ticker:'064760.KS',country:'KR',flag:'🇰🇷',step:'equip',price:258500,prev:275000,chg:-16500,chgPct:-6.00,spark:[75,83,73,70,80,71,74,84,86,72,77,73,3]},
  {id:'anji',name:'Anji Micro',ticker:'688019.SS',country:'CN',flag:'🇨🇳',step:'equip',price:245.99,prev:245.62,chg:0.37,chgPct:0.15,spark:[24,29,26,17,14,22,14,6,19,24,16,30,84]},
  {id:'tfme',name:'TFME (通富)',ticker:'002156.SZ',country:'CN',flag:'🇨🇳',step:'equip',price:68.27,prev:67.22,chg:1.05,chgPct:1.56,spark:[6,20,27,22,20,26,35,38,34,41,55,68,89]},
  {id:'snps',name:'Synopsys',ticker:'SNPS',country:'US',flag:'🇺🇸',step:'test',price:455.51,prev:461.74,chg:-6.23,chgPct:-1.35,spark:[92,95,92,92,94,94,83,76,69,57,53,39,7],note:'🔑 HBF 인터페이스 IP 주도'},
  {id:'rmbs',name:'Rambus',ticker:'RMBS',country:'US',flag:'🇺🇸',step:'test',price:141.17,prev:130.10,chg:11.07,chgPct:8.51,spark:[83,67,55,63,69,56,49,37,24,20,8,10,21],note:'🔑 HBF 컨트롤러 IP'},
  {id:'ter',name:'Teradyne',ticker:'TER',country:'US',flag:'🇺🇸',step:'test',price:437.92,prev:408.56,chg:29.36,chgPct:7.19,spark:[21,18,12,25,33,41,46,43,48,51,47,40,93]},
  {id:'adv',name:'Advantest',ticker:'6857.T',country:'JP',flag:'🇯🇵',step:'test',price:31740,prev:30300,chg:1440,chgPct:4.75,spark:[25,17,21,34,25,36,46,56,49,40,42,55,83]},
  {id:'tfe',name:'티에프이',ticker:'425420.KS',country:'KR',flag:'🇰🇷',step:'test',price:48800,prev:52000,chg:-3200,chgPct:-6.15,spark:[78,61,64,64,54,53,44,38,38,31,19,19,1]},
  {id:'sol',name:'SOL AI소부장 ETF',ticker:'473050.KS',country:'KR',flag:'🇰🇷',step:'test',price:2075,prev:2075,chg:0,chgPct:0.00,spark:[87,79,67,77,70,61,60,61,62,54,52,39,0]},
];

const STEPS=[
  {id:'idm',label:'① IDM — Memory Makers',icon:'🏭',desc:'CBA 아키텍처·3D NAND 적층 제조'},
  {id:'equip',label:'② Equipment & Materials',icon:'🔧',desc:'적층 패키징·CMP·본딩 장비/소재'},
  {id:'test',label:'③ Test & IP',icon:'🔬',desc:'인터페이스 검증·컨트롤러 IP 설계'},
];

const TABS=[{id:'all',label:'ALL',country:null},{id:'kr',label:'KOREA',country:'KR'},{id:'us',label:'USA',country:'US'},{id:'cn',label:'CHINA',country:'CN'}];
let activeTab='all';

// ===== Helpers =====
function fmt(s){if(s.price===null)return'--';if(s.country==='KR'){if(s.price>=1e6)return'₩'+(s.price/1e8).toFixed(2)+'억';if(s.price>=1e4)return'₩'+(s.price/1e4).toFixed(1)+'만';return'₩'+s.price.toLocaleString()}if(s.country==='JP')return'¥'+s.price.toLocaleString();if(s.country==='NL')return'€'+s.price.toFixed(2);if(s.country==='CN')return'¥'+s.price.toFixed(2);return'$'+s.price.toFixed(2)}
function chgHTML(s){if(s.chgPct===null)return'<span style="color:var(--text-dim)">--</span>';const sign=s.chgPct>0?'+':'';const c=s.chgPct>0?'var(--green)':s.chgPct<0?'var(--red)':'var(--text-dim)';return`<span style="color:${c}">${sign}${s.chgPct.toFixed(2)}%</span>`}
function sparkSVG(data,up){if(!data||data.length<2)return'';const min=Math.min(...data),max=Math.max(...data),range=max-min||1;let pts=data.map((v,i)=>`${2+(i/(data.length-1))*96},${22-((v-min)/range)*20}`);const color=up?'#3fb950':'#f85149';return`<svg viewBox="0 0 100 24"><polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/></svg>`}
function chainCard(s){const up=s.chg>0;return`<div class="chain-card ${s.chg>0?'cc-up':s.chg<0?'cc-down':''}" onclick="openModal('${s.id}')" data-country="${s.country}" data-step="${s.step}"><div class="cc-top"><div class="cc-name">${s.flag} ${s.name}</div><span class="cc-change">${chgHTML(s)}</span></div><div class="cc-ticker">${s.ticker}</div><div class="cc-bottom"><span class="cc-price">${fmt(s)}</span></div><div class="cc-spark">${sparkSVG(s.spark,up)}</div></div>`}

// ===== Render =====
function renderChain(filterCountry){
  const cf=document.getElementById('chainFlow');cf.innerHTML='';
  STEPS.forEach((step,i)=>{
    let stocks=STOCKS.filter(s=>s.step===step.id);
    if(filterCountry)stocks=stocks.filter(s=>s.country===filterCountry);
    if(!stocks.length)return;
    if(i>0&&cf.children.length){
      const c=document.createElement('div');c.className='chain-connector';
      c.innerHTML='<div class="line"></div><div class="arrow">→</div>';cf.appendChild(c);
    }
    const d=document.createElement('div');d.className='chain-step';
    d.innerHTML=`<div class="step-label">${step.icon} ${step.label}</div><div style="font-size:10px;color:var(--text-muted);margin-bottom:8px">${step.desc}</div>${stocks.map(chainCard).join('')}`;
    cf.appendChild(d);
  });
  // GSAP: animate chain cards
  setTimeout(()=>{gsap.from('.chain-card',{y:20,opacity:0,duration:.4,stagger:.04,ease:'power2.out'})},50);
}

function renderSummary(filterCountry){
  let d=STOCKS.filter(s=>s.price!==null);if(filterCountry)d=d.filter(s=>s.country===filterCountry);
  const up=d.filter(s=>s.chg>0).length,down=d.filter(s=>s.chg<0).length;
  const best=d.length?d.reduce((a,b)=>a.chgPct>b.chgPct?a:b):null;
  const worst=d.length?d.reduce((a,b)=>a.chgPct<b.chgPct?a:b):null;
  const idx=d.length?1000+d.reduce((s,x)=>s+x.chgPct*10,0)/d.length:1000;
  document.getElementById('summaryRow').innerHTML=`
    <div class="summary-card"><div class="s-label">HBF Market Index</div><div class="s-value" id="idxVal">${idx.toFixed(2)}</div><div class="s-sub up">+${((idx-1000)/10).toFixed(1)}% avg</div></div>
    <div class="summary-card"><div class="s-label">📈 Top Gainer</div><div class="s-value up">${best?best.name:'--'}</div><div class="s-sub up">${best?(best.chgPct>0?'+':'')+best.chgPct.toFixed(1)+'%':'--'}</div></div>
    <div class="summary-card"><div class="s-label">📉 Top Loser</div><div class="s-value down">${worst?worst.name:'--'}</div><div class="s-sub down">${worst?worst.chgPct.toFixed(1)+'%':'--'}</div></div>
    <div class="summary-card"><div class="s-label">Standard Status</div><div class="s-value" style="color:var(--cyan);font-size:16px">OCP v1.2 Adopted</div><div class="s-sub" style="color:var(--text-dim)">SK hynix + SanDisk 주도</div></div>`;
  setTimeout(()=>{gsap.from('.summary-card',{y:-15,opacity:0,duration:.45,stagger:.08,ease:'power3.out'})},50);
}

function renderTabs(){
  document.getElementById('tabBar').innerHTML=TABS.map(t=>`<button class="tab${activeTab===t.id?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');
}
function switchTab(id){
  activeTab=id;renderTabs();
  const tab=TABS.find(t=>t.id===id);
  renderSummary(tab.country);renderChain(tab.country);
}

// ===== Chart =====
let chartData=null;
fetch('data.json').then(r=>r.json()).then(d=>{chartData=d}).catch(()=>{});
function drawChart(canvas,data,isUp){
  const ctx=canvas.getContext('2d');const W=canvas.width=canvas.offsetWidth*2;const H=canvas.height=canvas.offsetHeight*2;
  ctx.scale(2,2);const w=W/2,h=H/2,pad=10;ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=.5;
  for(let i=0;i<5;i++){const y=pad+(h-pad*2)*(i/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}
  if(!data||data.length<2){ctx.fillStyle='#7d8590';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('📊 No data',w/2,h/2);return}
  const closes=data.map(d=>d.close),min=Math.min(...closes),max=Math.max(...closes),range=max-min||1;
  const toX=i=>pad+(i/(data.length-1))*(w-pad*2),toY=v=>h-pad-((v-min)/range)*(h-pad*2);
  const grad=ctx.createLinearGradient(0,pad,0,h-pad),color=isUp?'#3fb950':'#f85149';
  grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'02');ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(toX(0),h-pad);data.forEach((d,i)=>ctx.lineTo(toX(i),toY(d.close)));ctx.lineTo(toX(data.length-1),h-pad);ctx.closePath();ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.lineJoin='round';ctx.beginPath();data.forEach((d,i)=>i===0?ctx.moveTo(toX(i),toY(d.close)):ctx.lineTo(toX(i),toY(d.close)));ctx.stroke();
  const fmtP=v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1000?(v/1e3).toFixed(1)+'K':v.toFixed(2);
  ctx.fillStyle='#7d8590';ctx.font='9px monospace';ctx.textAlign='start';
  ctx.fillText(fmtP(max),pad,pad+10);ctx.fillText(fmtP(min),pad,h-pad-2);ctx.fillText(fmtP((max+min)/2),pad,toY((max+min)/2)+4);
}

function openModal(id){
  const s=STOCKS.find(x=>x.id===id);if(!s)return;
  const overlay=document.getElementById('modalOverlay');
  document.getElementById('mName').textContent=s.flag+' '+s.name;
  document.getElementById('mMeta').textContent=s.ticker+' · '+(s.note||'')+' · '+fmt(s)+(s.chgPct!==null?' · '+(s.chgPct>0?'+':'')+s.chgPct.toFixed(2)+'%':'');
  const cw=document.getElementById('chartWrap');
  if(!s.ticker||s.ticker.includes('비상장')){cw.innerHTML=`<div style="height:340px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);flex-direction:column;gap:8px"><span style="font-size:16px">📊 ${s.name}</span><span style="font-size:12px">비상장 — 차트 미지원</span></div>`}
  else if(!chartData||!chartData[s.id]){cw.innerHTML=`<div style="height:340px;display:flex;align-items:center;justify-content:center;color:var(--text-dim)">⏳ 데이터 로딩 중...</div>`}
  else{
    const raw=chartData[s.id],ohlc=raw.map(p=>({date:new Date(p.t*1000),close:p.c,high:p.h||p.c,low:p.l||p.c,volume:p.v||0}));
    const isUp=ohlc.length>0&&ohlc[ohlc.length-1].close>=ohlc[0].close,first=ohlc[0],last=ohlc[ohlc.length-1];
    const high=Math.max(...ohlc.map(d=>d.high)),low=Math.min(...ohlc.map(d=>d.low)),avgVol=Math.round(ohlc.reduce((s,d)=>s+d.volume,0)/ohlc.length);
    cw.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px"><div style="background:var(--card);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--text-dim)">OPEN</div><div style="font-size:13px;font-weight:700">${first?.close?.toFixed(2)||'--'}</div></div><div style="background:var(--card);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--text-dim)">HIGH</div><div style="font-size:13px;font-weight:700;color:var(--green)">${high?.toFixed(2)||'--'}</div></div><div style="background:var(--card);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--text-dim)">LOW</div><div style="font-size:13px;font-weight:700;color:var(--red)">${low?.toFixed(2)||'--'}</div></div><div style="background:var(--card);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--text-dim)">VOL (avg)</div><div style="font-size:11px;font-weight:700">${avgVol>=1e6?(avgVol/1e6).toFixed(1)+'M':avgVol>=1e3?(avgVol/1e3).toFixed(1)+'K':avgVol}</div></div></div><canvas id="chartCanvas" style="width:100%;height:260px;border-radius:8px;background:var(--card)"></canvas><div style="font-size:9px;color:var(--text-muted);text-align:center;margin-top:4px">${first?.date?.toLocaleDateString('ko-KR')||''} — ${last?.date?.toLocaleDateString('ko-KR')||''} · 6개월 일간 차트</div>`;
    setTimeout(()=>{const c=document.getElementById('chartCanvas');if(c)drawChart(c,ohlc,isUp)},50);
  }
  // GSAP modal animation
  overlay.style.display='flex';
  gsap.fromTo(overlay,{opacity:0},{opacity:1,duration:.2});
  gsap.fromTo('.modal',{scale:.95,opacity:0,y:20},{scale:1,opacity:1,y:0,duration:.3,ease:'back.out(1.4)'});
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  const overlay=document.getElementById('modalOverlay');
  gsap.to(overlay,{opacity:0,duration:.15,onComplete:()=>{overlay.style.display='none'}});
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
