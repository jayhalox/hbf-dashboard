<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBF MONITOR — Global Value Chain Dashboard</title>
<style>
:root {
  --bg: #080b10;
  --surface: #0d1117;
  --card: #111722;
  --border: #1a2332;
  --border-glow: #1e3048;
  --text: #e6edf3;
  --text-dim: #7d8590;
  --text-muted: #484f58;
  --cyan: #00b4d8;
  --cyan-glow: rgba(0,180,216,0.20);
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.10);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.10);
  --gold: #d2991d;
  --purple: #a371f7;
  --radius: 10px;
  --radius-sm: 7px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Inter','Noto Sans KR',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
}
.container{max-width:1320px;margin:0 auto;padding:16px 20px}

/* === TOP BAR === */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 10px;
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
  flex-wrap:wrap;gap:8px;
}
.topbar .logo{
  font-size:18px;font-weight:800;letter-spacing:2px;
  color:#fff;
}
.topbar .logo span{color:var(--cyan)}

/* Tabs */
.tabs{display:flex;gap:2px;}
.tab{
  padding:7px 18px;border:none;background:transparent;
  color:var(--text-dim);font-size:12px;font-weight:600;
  cursor:pointer;border-radius:6px;transition:all .18s;
  font-family:inherit;letter-spacing:.5px;
  position:relative;
}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.tab.active{color:var(--cyan);}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:30%;right:30%;height:2px;
  background:var(--cyan);border-radius:2px;
  box-shadow:0 0 8px var(--cyan-glow);
}

/* Live indicator */
.live-indicator{
  display:flex;align-items:center;gap:6px;color:var(--cyan);font-size:11px;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--cyan-glow)}50%{box-shadow:0 0 0 6px transparent}}
.update-time{color:var(--text-muted);font-size:11px}

/* === SUMMARY CARDS === */
.summary-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:22px;
}
.summary-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  position:relative;overflow:hidden;
}
.summary-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
}
.summary-card .s-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.summary-card .s-value{font-size:22px;font-weight:700}
.summary-card .s-sub{font-size:11px;margin-top:2px}
.up{color:var(--green)}.down{color:var(--red)}

/* === VALUE CHAIN FLOW === */
.chain-title{
  font-size:13px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:14px;
}
.chain-flow{
  display:flex;gap:0;align-items:flex-start;
  position:relative;margin-bottom:28px;
  overflow-x:auto;
}
.chain-step{
  flex:1;min-width:280px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  position:relative;
}
.chain-step+.chain-step{margin-left:0}
.chain-connector{
  display:flex;align-items:center;justify-content:center;
  min-width:40px;color:var(--cyan);
  font-size:16px;opacity:.6;
  align-self:stretch;
}
.chain-connector .line{
  width:2px;height:100%;min-height:60px;
  background:linear-gradient(180deg,transparent,var(--cyan),transparent);
  opacity:.4;
}
.chain-connector .arrow{font-size:20px}
.step-label{
  font-size:10px;color:var(--cyan);text-transform:uppercase;
  letter-spacing:1.5px;font-weight:700;margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}

/* Stock card in chain */
.chain-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;
  cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;
}
.chain-card:hover{
  border-color:var(--cyan);
  box-shadow:0 0 16px rgba(0,180,216,0.08);
  transform:translateY(-1px);
}
.chain-card .cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.chain-card .cc-name{font-size:13px;font-weight:700}
.chain-card .cc-flag{font-size:14px}
.chain-card .cc-ticker{font-size:10px;color:var(--text-dim);font-family:monospace;margin-bottom:6px}
.chain-card .cc-bottom{display:flex;justify-content:space-between;align-items:center}
.chain-card .cc-price{font-size:15px;font-weight:700;font-family:'SF Mono',monospace}
.chain-card .cc-change{font-size:11px;font-weight:700;border-radius:4px;padding:2px 7px;}
.cc-up{color:var(--green);.cc-change{background:var(--green-bg)}}
.cc-down{color:var(--red);.cc-change{background:var(--red-bg)}}
/* Sparkline */
.cc-spark{height:28px;margin-top:6px;opacity:.5}
.cc-spark svg{width:100%;height:100%}

/* === RIGHT PANEL: NEWS === */
.panels{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-top:6px}
.news-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
}
.news-panel h3{font-size:12px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.news-item{
  padding:10px 0;border-bottom:1px solid var(--border);
}
.news-item:last-child{border-bottom:none}
.news-item .n-source{font-size:9px;color:var(--cyan);text-transform:uppercase;margin-bottom:2px}
.news-item .n-title{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.4}
.news-item .n-summary{font-size:11px;color:var(--text-dim);line-height:1.4}

/* Sources */
.sources-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
}
.sources-panel h3{font-size:12px;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.source-tag{
  display:inline-block;padding:5px 10px;margin:0 4px 6px 0;
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;font-size:10px;color:var(--text-dim);
}

/* Insight */
.insight-bar{
  background:linear-gradient(135deg,rgba(0,180,216,0.05),rgba(163,113,247,0.04));
  border:1px solid var(--border-glow);border-radius:var(--radius);
  padding:14px 18px;margin-top:16px;
  font-size:12px;color:#b0b8c4;line-height:1.6;
}
.insight-bar strong{color:var(--gold)}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.82);z-index:999;
  justify-content:center;align-items:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;width:min(92vw,780px);max-height:88vh;
  overflow-y:auto;padding:22px;position:relative;
}
.modal .close-btn{
  position:absolute;top:12px;right:14px;background:none;
  border:none;color:var(--text-dim);font-size:22px;
  cursor:pointer;width:34px;height:34px;display:flex;
  align-items:center;justify-content:center;border-radius:50%;
}
.modal .close-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.modal .m-name{font-size:20px;font-weight:700}
.modal .m-meta{font-size:11px;color:var(--text-dim);margin-bottom:14px}
.modal .chart-wrap{height:340px;border-radius:8px;overflow:hidden}

.footer{text-align:center;padding:24px;font-size:10px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:28px}
.footer a{color:var(--cyan);text-decoration:none}

@media(max-width:900px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .chain-flow{flex-direction:column}
  .chain-connector{display:none}
  .panels{grid-template-columns:1fr}
}
@media(max-width:500px){
  .summary-row{grid-template-columns:1fr 1fr}
  .topbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>

  {id:'tfme',name:'TFME (通富)',ticker:'002156.SZ',country:'CN',flag:'🇨🇳',step:'equip',price:71.10,prev:66.00,chg:5.10,chgPct:7.73,tv:'SZSE:002156',spark:[85,87,90,92,95,97,100,103,105,108,110,112,114]},

  // Step 3: Test & IP
  {id:'snps',name:'Synopsys',ticker:'SNPS',country:'US',flag:'🇺🇸',step:'test',price:494.48,prev:480.64,chg:13.84,chgPct:2.88,tv:'NASDAQ:SNPS',spark:[92,94,95,97,98,99,100,102,103,104,105,106,107],note:'🔑 HBF 인터페이스 IP 주도'},
  {id:'rmbs',name:'Rambus',ticker:'RMBS',country:'US',flag:'🇺🇸',step:'test',price:169.35,prev:148.02,chg:21.33,chgPct:14.41,tv:'NASDAQ:RMBS',spark:[78,82,86,90,94,98,103,107,110,114,117,120,124],note:'🔑 HBF 컨트롤러 IP'},
  {id:'ter',name:'Teradyne',ticker:'TER',country:'US',flag:'🇺🇸',step:'test',price:406.86,prev:382.65,chg:24.21,chgPct:6.33,tv:'NASDAQ:TER',spark:[88,90,92,94,97,99,102,104,106,108,110,111,113]},

  {id:'tfe',name:'티에프이',ticker:'425420.KS',country:'KR',flag:'🇰🇷',step:'test',price:26250,prev:54200,chg:-27950,chgPct:-51.57,tv:'KRX:425420',spark:[100,95,90,82,74,66,58,52,48,44,40,37,35]},

];

// Chain step definitions
const STEPS = [
  {id:'idm',label:'① IDM — Memory Makers',icon:'🏭',desc:'CBA 아키텍처·3D NAND 적층 제조'},
  {id:'equip',label:'② Equipment & Materials',icon:'🔧',desc:'적층 패키징·CMP·본딩 장비/소재'},
  {id:'test',label:'③ Test & IP',icon:'🔬',desc:'인터페이스 검증·컨트롤러 IP 설계'},
];

// ===== PRICE FORMAT =====
function fmt(s){
  if(s.price===null)return '--';
  if(s.country==='KR'){if(s.price>=1e6)return'₩'+(s.price/1e8).toFixed(2)+'억';if(s.price>=1e4)return'₩'+(s.price/1e4).toFixed(1)+'만';return'₩'+s.price.toLocaleString()}
  if(s.country==='JP')return'¥'+s.price.toLocaleString();
  if(s.country==='NL')return'€'+s.price.toFixed(2);
  if(s.country==='CN')return'¥'+s.price.toFixed(2);
  return'$'+s.price.toFixed(2);
}

function chgHTML(s){
  if(s.chgPct===null)return'<span style="color:var(--text-dim)">--</span>';
  const sign=s.chgPct>0?'+':'';
  const color=s.chgPct>0?'var(--green)':s.chgPct<0?'var(--red)':'var(--text-dim)';
  return`<span style="color:${color}">${sign}${s.chgPct.toFixed(2)}%</span>`;
}

// ===== SPARKLINE SVG =====
function sparkSVG(data,up){
  if(!data||data.length<2)return'';
  const w=100,h=24,pad=2;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  let pts=data.map((v,i)=>`${pad+(i/(data.length-1))*(w-pad*2)},${h-pad-((v-min)/range)*(h-pad*2)}`);
  const color=up?'#3fb950':'#f85149';
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%"><polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/></svg>`;
}

// ===== RENDER CHAIN CARD =====
function chainCard(s){
  const up=s.chg>0;
  return`
  <div class="chain-card ${s.chg>0?'cc-up':s.chg<0?'cc-down':''}" onclick="openModal('${s.id}')" data-country="${s.country}" data-step="${s.step}">
    <div class="cc-top">
      <div class="cc-name">${s.flag} ${s.name}</div>
      <span class="cc-change">${chgHTML(s)}</span>
    </div>
    <div class="cc-ticker">${s.ticker}</div>
    <div class="cc-bottom">
      <span class="cc-price">${fmt(s)}</span>
    </div>
    <div class="cc-spark">${sparkSVG(s.spark,up)}</div>
  </div>`;
}

// ===== RENDER CHAIN FLOW =====
function renderChain(filterCountry){
  const cf=document.getElementById('chainFlow');
  cf.innerHTML='';
  STEPS.forEach((step,i)=>{
    let stocks=STOCKS.filter(s=>s.step===step.id);
    if(filterCountry)stocks=stocks.filter(s=>s.country===filterCountry);
    if(stocks.length===0)return;
    if(i>0&&cf.children.length>0){
      const conn=document.createElement('div');conn.className='chain-connector';
      conn.innerHTML='<div class="line"></div><div class="arrow">→</div>';
      cf.appendChild(conn);
    }
    const div=document.createElement('div');div.className='chain-step';
    div.innerHTML=`<div class="step-label">${step.icon} ${step.label}</div><div style="font-size:10px;color:var(--text-muted);margin-bottom:8px">${step.desc}</div>${stocks.map(chainCard).join('')}`;
    cf.appendChild(div);
  });
}

// ===== SUMMARY =====
function renderSummary(filterCountry){
  let data=STOCKS.filter(s=>s.price!==null);
  if(filterCountry)data=data.filter(s=>s.country===filterCountry);
  const up=data.filter(s=>s.chg>0).length;
  const down=data.filter(s=>s.chg<0).length;
  const best=data.length?data.reduce((a,b)=>a.chgPct>b.chgPct?a:b):null;
  const worst=data.length?data.reduce((a,b)=>a.chgPct<b.chgPct?a:b):null;
  // HBF Market Index: avg of all % changes weighted
  const idx=data.length?1000+data.reduce((s,x)=>s+x.chgPct*10,0)/data.length:1000;
  document.getElementById('summaryRow').innerHTML=`
    <div class="summary-card">
      <div class="s-label">HBF Market Index</div>
      <div class="s-value">${idx.toFixed(2)}</div>
      <div class="s-sub up">+${((idx-1000)/10).toFixed(1)}% avg</div>
    </div>
    <div class="summary-card">
      <div class="s-label">📈 Top Gainer</div>
      <div class="s-value up">${best?best.name:'--'}</div>
      <div class="s-sub up">${best?(best.chgPct>0?'+':'')+best.chgPct.toFixed(1)+'%':'--'}</div>
    </div>
    <div class="summary-card">
      <div class="s-label">📉 Top Loser</div>
      <div class="s-value down">${worst?worst.name:'--'}</div>
      <div class="s-sub down">${worst?worst.chgPct.toFixed(1)+'%':'--'}</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Standard Status</div>
      <div class="s-value" style="color:var(--cyan);font-size:16px">OCP v1.2 Adopted</div>
      <div class="s-sub" style="color:var(--text-dim)">SK hynix + SanDisk 주도</div>
    </div>`;
}

// ===== TABS =====
const TABS=[
  {id:'all',label:'ALL',country:null},
  {id:'kr',label:'KOREA',country:'KR'},
  {id:'us',label:'USA',country:'US'},
  {id:'cn',label:'CHINA',country:'CN'},
];
let activeTab='all';

function renderTabs(){
  document.getElementById('tabBar').innerHTML=TABS.map(t=>`<button class="tab${activeTab===t.id?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');
}

function switchTab(id){
  activeTab=id;
  renderTabs();
  const tab=TABS.find(t=>t.id===id);
  renderSummary(tab.country);
  renderChain(tab.country);
}

// ===== MODAL =====
function openModal(id){
  const s=STOCKS.find(x=>x.id===id);if(!s)return;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('mName').textContent=s.flag+' '+s.name;
  document.getElementById('mMeta').textContent=s.ticker+' · '+(s.note||'')+' · '+(s.country==='KR'?'Korea':s.country==='US'?'USA':s.country==='JP'?'Japan':s.country==='NL'?'Netherlands':s.country==='CN'?'China':'');
  const cw=document.getElementById('chartWrap');
  if(s.tv){
    cw.innerHTML=`<iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tv_${Date.now()}&symbol=${encodeURIComponent(s.tv)}&interval=D&hidesidetoolbar=1&symboledit=0&saveimage=0&details=1&hotlist=0&studies=[]&theme=dark&style=1&timezone=Asia/Seoul&withdateranges=1&hideideas=1&locale=kr" style="width:100%;height:340px;border:none;border-radius:8px"></iframe>`;
  }else{
    cw.innerHTML=`<div style="height:200px;display:flex;align-items:center;justify-content:center;color:var(--text-dim)">📊 ${s.name} — 아직 상장되지 않음 (Kioxia IPO 준비 중)</div>`;
  }
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('show');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modalOverlay').classList.remove('show')});

renderChain(null);
